# Optional local stack: API only (client usually runs via Vite on the host).
services:
  server:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start"
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
    environment:
      PORT: "3000"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
